<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>JS Tasks</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        section { margin-bottom: 40px; border-bottom: 1px solid #ccc; padding-bottom: 20px; }
        /* для 5 */
        #elid {
            width: 50px;
            height: 50px;
            background-color: black;
            position: relative;
            left: 0;
            transition: left 0.5s ease;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<section>
    3: пошук коду округу
    <input type="text" id="countyInput" placeholder="Наприклад: Baldwin County, Alabama">
    <button onclick="handleSearch()">Знайти код</button>
    <div id="result"></div>
</section>

<section>
    4: Валідація форми
    <form id="userForm">
        <input type="text" name="first_name" placeholder="Ім'я"><br>
        <input type="text" name="last_name" placeholder="Прізвище"><br>
        <input type="email" name="email" placeholder="Email"><br>
        <button type="submit">Відправити</button>
    </form>
</section>

<section>
    ### Завдання 5: Анімація
    <div id="elid"></div>
    <button onclick="move('left')">Вліво</button>
    <button onclick="move('right')">Вправо</button>
</section>

<script>

    let name = "Василь";
    let admin = name;
    console.log(admin);

      // завд.3
    let countiesData = [];

    async function fetchCounties() {
        try {
            const response = await fetch('https://api.census.gov/data/2020/acs/acs5/profile?get=NAME&for=county:*');
            const data = await response.json();

            // масив масивів у масив об'єктів)
            countiesData = data.slice(1).map(item => ({
                name: item[0],
                code: item[1] + item[2] // state + county
            }));
            console.log("Дані завантажено");
        } catch (error) {
            console.error("Помилка завантаження:", error);
        }
    }

    function findCountyCode(countyName) {
        const found = countiesData.find(c => c.name.toLowerCase() === countyName.toLowerCase().trim());
        return found ? found.code : "Округ не знайдено";
    }

    function handleSearch() {
        const val = document.getElementById('countyInput').value;
        const res = findCountyCode(val);
        document.getElementById('result').innerText = "Код: " + res;
    }

    // Завантажує дані
    fetchCounties();


    // завд 4
    document.getElementById('userForm').addEventListener('submit', function(e) {
        const firstName = this.first_name.value.trim();
        const lastName = this.last_name.value.trim();
        const email = this.email.value.trim();

        if (!firstName || !lastName || !email) {
            e.preventDefault();
            alert("Будь ласка, заповніть всі поля!");
        } else {
            alert(`Дані: ${firstName} ${lastName}, Email: ${email}`);
        }
    });


    // завд5
    let currentPos = 0;
    function move(direction) {
        const el = document.getElementById('elid');
        if (direction === 'right') currentPos += 100;
        if (direction === 'left') currentPos -= 100;
        el.style.left = currentPos + 'px';
    }
</script>
</body>
</html>
